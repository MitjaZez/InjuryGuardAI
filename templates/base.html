<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InjuryGuard AI MVP{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="{{ url_for('home') }}">
            InjuryGuard AI
        </a>

        <div class="ms-auto d-flex align-items-center gap-4">
            <a href="{{ url_for('home') }}" class="nav-link">Početna</a>
            <a href="{{ url_for('analyze') }}" class="nav-link">Nova analiza</a>

            {% if session.get("user_id") %}
                <a href="{{ url_for('history') }}" class="nav-link">Istorija</a>

                <span class="navbar-text text-muted">
                    Zdravo, {{ session.get("user_name") }}
                </span>

                <a href="{{ url_for('logout') }}" class="nav-link">Odjava</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="nav-link">Prijava</a>

                <a href="{{ url_for('register') }}" class="btn btn-primary btn-sm">
                    Registracija
                </a>
            {% endif %}
        </div>
    </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer mt-5 py-4 bg-light">
        <div class="container text-center">
            <p class="mb-0 text-muted">
                InjuryGuard AI MVP – studentski projekat za prevenciju sportskih povreda
            </p>
        </div>
    </footer>

</body>
</html>
